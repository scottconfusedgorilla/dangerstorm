<!DOCTYPE html>
<html><head><title>Generate Icons</title></head>
<body style="background:#111;color:#fff;font-family:sans-serif;padding:40px;">
<h2>DangerStorm Icon Generator</h2>
<p>Right-click each image and "Save image as..." to save the PNGs.</p>
<div style="display:flex;gap:20px;margin-top:20px;">
  <div><canvas id="c512" width="512" height="512"></canvas><p>icon-512.png</p></div>
  <div><canvas id="c192" width="192" height="192"></canvas><p>icon-192.png</p></div>
</div>
<script>
function draw(canvas) {
  const s = canvas.width;
  const ctx = canvas.getContext("2d");
  const r = s * 0.1875; // corner radius

  // Rounded rect background
  ctx.beginPath();
  ctx.moveTo(r, 0);
  ctx.lineTo(s - r, 0);
  ctx.quadraticCurveTo(s, 0, s, r);
  ctx.lineTo(s, s - r);
  ctx.quadraticCurveTo(s, s, s - r, s);
  ctx.lineTo(r, s);
  ctx.quadraticCurveTo(0, s, 0, s - r);
  ctx.lineTo(0, r);
  ctx.quadraticCurveTo(0, 0, r, 0);
  ctx.closePath();
  ctx.fillStyle = "#0F172A";
  ctx.fill();

  // Subtle inner border
  ctx.strokeStyle = "#1E293B";
  ctx.lineWidth = s * 0.008;
  ctx.stroke();

  // D letter
  ctx.fillStyle = "#FFFFFF";
  ctx.font = `900 ${s * 0.43}px "Arial Black", Arial, sans-serif`;
  ctx.textBaseline = "middle";
  ctx.fillText("D", s * 0.06, s * 0.54);

  // Lightning bolt
  const bx = s * 0.44; // bolt center x offset
  ctx.fillStyle = "#F97316";
  ctx.beginPath();
  ctx.moveTo(bx + s*0.08, s*0.14);
  ctx.lineTo(bx - s*0.02, s*0.44);
  ctx.lineTo(bx + s*0.10, s*0.44);
  ctx.lineTo(bx - s*0.04, s*0.86);
  ctx.lineTo(bx + s*0.18, s*0.38);
  ctx.lineTo(bx + s*0.06, s*0.38);
  ctx.lineTo(bx + s*0.16, s*0.14);
  ctx.closePath();
  ctx.fill();

  // S letter
  ctx.fillStyle = "#FFFFFF";
  ctx.fillText("S", s * 0.62, s * 0.54);
}

draw(document.getElementById("c512"));
draw(document.getElementById("c192"));
</script>
</body></html>
