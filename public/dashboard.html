<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#0F172A">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Dashboard — DangerStorm</title>
    <link rel="manifest" href="/manifest.json">
    <link rel="icon" href="/icon.svg" type="image/svg+xml">
    <link rel="apple-touch-icon" href="/icon-192.png">
    <link rel="stylesheet" href="/style.css">
</head>
<body>
    <div id="app">
        <header>
            <div class="header-row">
                <a href="/" style="text-decoration: none;"><h1>DANGER<svg class="header-bolt" width="24" height="32" viewBox="0 0 24 40" fill="#F97316"><polygon points="14,0 6,18 14,18 4,40 22,16 13,16 20,0"/></svg><span class="accent">STORM</span></h1></a>
                <div id="auth-bar"></div>
            </div>
            <p class="tagline">One idea. One domain. One deck.</p>
        </header>

        <div id="dashboard-container">
            <div class="dashboard-header">
                <div class="idea-count" id="idea-count"></div>
                <div class="dashboard-header-actions">
                    <button id="download-all-dashboard-btn" class="action-btn hidden" onclick="downloadAllIdeas()">Download All</button>
                    <a href="/?new=1" class="action-btn primary"><svg width="12" height="16" viewBox="0 0 24 40" fill="currentColor" style="vertical-align:middle;margin:-2px 4px 0 0;"><polygon points="14,0 6,18 14,18 4,40 22,16 13,16 20,0"/></svg>New Idea</a>
                </div>
            </div>

            <div id="ideas-loading" class="dashboard-loading">Loading your ideas...</div>
            <div id="ideas-empty" class="dashboard-empty hidden">
                <p>No ideas yet. Start your first one!</p>
                <a href="/" class="action-btn primary">Create your first idea</a>
            </div>
            <div id="ideas-grid" class="ideas-grid"></div>
        </div>

        <button id="trash-toggle-btn" class="trash-can-btn" onclick="toggleTrash()" title="Crappy Ideas">
            <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                <polyline points="3 6 5 6 21 6"/>
                <path d="M19 6l-1 14a2 2 0 01-2 2H8a2 2 0 01-2-2L5 6"/>
                <path d="M10 11v6"/>
                <path d="M14 11v6"/>
                <path d="M9 6V4a1 1 0 011-1h4a1 1 0 011 1v2"/>
            </svg>
            <span class="trash-label">Crappy Ideas</span>
        </button>
    </div>

    <div id="ds-modal-overlay" class="ds-modal-overlay hidden">
        <div class="ds-modal">
            <p id="ds-modal-message" class="ds-modal-message"></p>
            <div id="ds-modal-actions" class="ds-modal-actions"></div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/jszip@3/dist/jszip.min.js"></script>
    <script src="/auth.js"></script>
    <script src="/api.js"></script>
    <script src="/dashboard.js"></script>
</body>
</html>
