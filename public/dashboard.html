<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard — DangerStorm</title>
    <link rel="stylesheet" href="/style.css">
</head>
<body>
    <div id="app">
        <header>
            <div class="header-row">
                <a href="/" style="text-decoration: none;"><h1>DANGER<span class="accent">STORM</span></h1></a>
                <div id="auth-bar"></div>
            </div>
            <p class="tagline">One idea. One domain. One deck.</p>
        </header>

        <div id="dashboard-container">
            <div class="dashboard-header">
                <div class="idea-count" id="idea-count"></div>
                <div class="dashboard-header-actions">
                    <a href="/?new=1" class="action-btn primary">New Idea</a>
                </div>
            </div>

            <div id="ideas-loading" class="dashboard-loading">Loading your ideas...</div>
            <div id="ideas-empty" class="dashboard-empty hidden">
                <p>No ideas yet. Start your first one!</p>
                <a href="/" class="action-btn primary">Create your first idea</a>
            </div>
            <div id="ideas-grid" class="ideas-grid"></div>
        </div>

        <button id="trash-toggle-btn" class="trash-can-btn" onclick="toggleTrash()" title="Crappy Ideas">
            <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                <polyline points="3 6 5 6 21 6"/>
                <path d="M19 6l-1 14a2 2 0 01-2 2H8a2 2 0 01-2-2L5 6"/>
                <path d="M10 11v6"/>
                <path d="M14 11v6"/>
                <path d="M9 6V4a1 1 0 011-1h4a1 1 0 011 1v2"/>
            </svg>
            <span class="trash-label">Crappy Ideas</span>
        </button>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
    <script src="/auth.js"></script>
    <script src="/api.js"></script>
    <script src="/dashboard.js"></script>
</body>
</html>
